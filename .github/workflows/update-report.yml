name: Update StoryPark Report

on:
  schedule:
    - cron: '0 12 * * 0'  # Every Sunday at 12:00 noon UTC
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  update-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate report
        run: python build_report.py

      - name: Commit and push updated report
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update StoryPark report"
          git push
