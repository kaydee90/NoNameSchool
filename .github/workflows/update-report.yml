name: Update Attendance Report

on:
  schedule:
    - cron: '0 23 * * 5,6,0'  # Sat, Sun, Mon at 7:00 AM Perth time (UTC+8 = 23:00 UTC prev day)
  workflow_dispatch:           # Also allows manual trigger from GitHub

jobs:
  update-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate report
        run: python build_report.py

      - name: Commit and push updated report
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update StoryPark report"
          git push
